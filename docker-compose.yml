version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: minecraft_db
    environment:
      POSTGRES_DB: minecraft
      POSTGRES_USER: minecraft
      POSTGRES_PASSWORD: minecraft123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minecraft"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: minecraft_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: minecraft_api
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://minecraft:minecraft123@postgres:5432/minecraft
      REDIS_URL: redis://redis:6379
      JWT_SECRET: your-secret-key-change-this
      API_PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app/apps/api
      - /var/run/docker.sock:/var/run/docker.sock
      - minecraft_servers:/minecraft-servers
    command: npm run dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: minecraft_web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
    command: npm run dev

volumes:
  postgres_data:
  minecraft_servers:

networks:
  default:
    name: minecraft-network
